version: "3.8"

services:

  app:
    build: ./component-1-resilience-microservice
    ports:
      - "3000:3000"

  jenkins:
    build:
      context: ./component-3-ci-pipeline
      dockerfile: docker/Dockerfile.jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace

  k6:
    image: grafana/k6
    volumes:
      - ./component-7-load-testing:/scripts
    working_dir: /scripts

volumes:
  jenkins_home: